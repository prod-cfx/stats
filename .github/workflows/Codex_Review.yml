name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize] # 增加 synchronize 以恢复图标状态显示
  issue_comment:
    types: [created] # 监听评论触发
  workflow_dispatch:
    inputs:
      pr_number:
        description: '需要评审的 PR 编号（手动触发时必填）'
        required: true
        type: string

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    # 移除 job 级别的严苛 if，改为在 step 内部判断是否执行重度逻辑
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # 需要写 PR 评论
      issues: write          # 额外权限，确保评论功能
      statuses: write        # 必须增加此权限以更新 Commit 状态（图标）
    env:
      NX_DAEMON: "false"

    steps:
      - name: Check if review is required
        id: check_review
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          SHOULD_REVIEW="false"
          
          if [ "$EVENT_NAME" == "pull_request" ] && [ "$EVENT_ACTION" == "opened" ]; then
            echo "::notice::检测到 PR 首次开启，将执行自动审核。"
            SHOULD_REVIEW="true"
          elif [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "::notice::手动触发工作流，执行审核。"
            SHOULD_REVIEW="true"
          elif [ "$EVENT_NAME" == "issue_comment" ]; then
            if [[ "$COMMENT_BODY" == *"@gpt"* ]]; then
              if [[ "$AUTHOR_ASSOCIATION" == "OWNER" || "$AUTHOR_ASSOCIATION" == "MEMBER" || "$AUTHOR_ASSOCIATION" == "COLLABORATOR" ]]; then
                echo "::notice::检测到合规评论指令，开始手动审核。"
                SHOULD_REVIEW="true"
              else
                echo "::warning::评论者权限不足，跳过审核。"
              fi
            else
              echo "::debug::普通评论，跳过。"
            fi
          elif [ "$EVENT_NAME" == "pull_request" ] && [ "$EVENT_ACTION" == "synchronize" ]; then
            echo "::notice::检测到代码更新。为了节省额度，本次将仅标记状态为成功，不执行自动审核。如需审核请评论 '@gpt'。"
          fi

          echo "should_review=$SHOULD_REVIEW" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.check_review.outputs.should_review == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: steps.check_review.outputs.should_review == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check_review.outputs.should_review == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Configure npm global dir
        if: steps.check_review.outputs.should_review == 'true'
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Cache npm global directory
        if: steps.check_review.outputs.should_review == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.npm-global
          key: ${{ runner.os }}-npm-global-codex-latest
          restore-keys: |
            ${{ runner.os }}-npm-global-

      - name: Install dependencies
        if: steps.check_review.outputs.should_review == 'true'
        run: |
          echo "安装项目依赖..."
          pnpm install --no-frozen-lockfile --ignore-scripts
          echo "依赖安装完成"

      - name: Install Codex CLI
        if: steps.check_review.outputs.should_review == 'true'
        run: |
          if command -v codex >/dev/null 2>&1; then
            echo "✅ Codex CLI 已在缓存中可用"
            codex --version || true
          else
            echo "安装 Codex CLI..."
            npm install -g @openai/codex@latest
            codex --version || true
          fi

      - name: Verify GitHub CLI Authentication
        if: steps.check_review.outputs.should_review == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh --version || echo "gh not found; ensure runner has GitHub CLI"
          gh auth status || echo "GitHub CLI 将使用 GH_TOKEN 环境变量进行认证"
          gh repo view ${{ github.repository }} --json name

      # --- New step: create a progress comment on the PR so updates can be shown in the PR conversation ---
      - name: Create PR progress comment
        if: steps.check_review.outputs.should_review == 'true'
        id: create_progress_comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER_REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "::warning::未能确定 PR 编号，跳过创建进度评论。"
            echo "progress_comment_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          BODY="🤖 Codex 代码审查已启动 — PR #${PR_NUMBER}\n\n状态: **启动中**\n\n进度日志（实时更新）:\n\`\`\`\n初始化...\n\`\`\`"
          # Create the comment and output the comment id
          COMMENT_ID=$(gh api -X POST /repos/${OWNER_REPO}/issues/${PR_NUMBER}/comments -f body="$BODY" --jq '.id' || echo "")
          echo "progress_comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          echo "::notice::Created progress comment id $COMMENT_ID"

      # Run Codex in a step that will stream log updates back into the PR comment.
      - name: Run Codex autonomously (Codex evaluates & posts PR comment itself)
        if: steps.check_review.outputs.should_review == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          PROGRESS_COMMENT_ID: ${{ steps.create_progress_comment.outputs.progress_comment_id }}
        run: |
          set -eo pipefail
          OWNER_REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "::error::未能确定 PR 编号。"
            exit 1
          fi
          WORKDIR="${GITHUB_WORKSPACE:-/github/workspace}"

          if [ -z "$CODEX_AUTH_JSON_B64" ]; then
            echo "::error::缺少 CODEX_AUTH_JSON_B64 secret"
            exit 1
          fi

          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON_B64" | base64 -d > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

          PROMPT_FILE=".github/codex_prompt.txt"
          if [ ! -s "$PROMPT_FILE" ]; then
            echo "::error::未找到 $PROMPT_FILE"
            exit 1
          fi

          {
            echo "你是代码审查专家。请为 PR #${PR_NUMBER} 进行代码审查并直接发布评论。"
            echo
            echo "## 环境设置"
            echo "export GH_TOKEN='${GH_TOKEN}'"
            echo
            echo "## 任务"
            echo "1. 查看代码变更: \`gh pr diff ${PR_NUMBER} --repo ${OWNER_REPO}\`"
            echo "2. 基于评审标准进行分析"
            echo "3. 使用 \`gh pr comment ${PR_NUMBER} --repo ${OWNER_REPO} --body-file -\` 发布"
            echo
            echo "## 评审标准"
            cat "$PROMPT_FILE"
          } > prompt.autonomous.txt

          # Start a background updater that will periodically PATCH the PR progress comment with the latest log tail.
          # The updater will only run if we actually created a comment (i.e., PROGRESS_COMMENT_ID not empty).
          UPDATE_INTERVAL=6
          LOGFILE="codex.run.log"
          PIDFILE="/tmp/codex_updater.pid"

          if [ -n "$PROGRESS_COMMENT_ID" ]; then
            echo "启动后台进度更新器, comment id=$PROGRESS_COMMENT_ID"
            (
              # small debounce buffer to avoid too-frequent PATCHes
              while true; do
                if [ -f "$LOGFILE" ]; then
                  # include a short header and last N lines of log
                  LOG_SNIPPET="$(tail -n 500 "$LOGFILE" | sed 's/```/`\`\`/g')"
                  BODY="🤖 Codex 代码审查进行中 — PR #${PR_NUMBER}\n\n状态: **运行中**\n\n最新日志（尾部，最多 500 行）:\n\`\`\`\n$LOG_SNIPPET\n\`\`\`"
                  # PATCH the comment
                  gh api -X PATCH /repos/${OWNER_REPO}/issues/comments/${PROGRESS_COMMENT_ID} -f body="$BODY" >/dev/null 2>&1 || true
                fi
                sleep $UPDATE_INTERVAL
              done
            ) &
            echo $! > "$PIDFILE"
          else
            echo "::warning::没有可更新的进度评论 ID（可能是 workflow_dispatch 且未传入 pr_number），将不会在 PR 中显示实时进度。"
          fi

          # Run codex and capture output to log file
          node "$(which codex)" exec \
            --skip-git-repo-check \
            --dangerously-bypass-approvals-and-sandbox \
            --model gpt-5.1-codex \
            -C "${WORKDIR}" \
            "$(cat prompt.autonomous.txt)" > "$LOGFILE" 2>&1 || true

          CODEX_EXIT_CODE=$?
          # ensure any last logs are flushed to file
          sleep 1

          # Stop updater if it was started, and produce a final comment update with result and a log snippet
          if [ -f "$PIDFILE" ]; then
            UPDATER_PID=$(cat "$PIDFILE" || echo "")
            if [ -n "$UPDATER_PID" ]; then
              kill "$UPDATER_PID" >/dev/null 2>&1 || true
              # give process moment to exit
              wait "$UPDATER_PID" 2>/dev/null || true
            fi
            rm -f "$PIDFILE"
          fi

          # Compose final update body
          LOG_SNIPPET="$(tail -n 1000 "$LOGFILE" | sed 's/```/`\`\`/g')"
          if [ $CODEX_EXIT_CODE -eq 0 ]; then
            RESULT_STATUS="✅ 已完成（成功）"
          else
            RESULT_STATUS="❌ 已完成（失败，Exit code: $CODEX_EXIT_CODE）"
          fi

          FINAL_BODY="🤖 Codex 代码审查已完成 — PR #${PR_NUMBER}\n\n状态: **${RESULT_STATUS}**\n\n评审运行日志（尾部，最多 1000 行）:\n\`\`\`\n$LOG_SNIPPET\n\`\`\`\n\n完整运行详情可见 Actions 运行：${{ github.server_url }}/${OWNER_REPO}/actions/runs/${{ github.run_id }}"

          if [ -n "$PROGRESS_COMMENT_ID" ]; then
            gh api -X PATCH /repos/${OWNER_REPO}/issues/comments/${PROGRESS_COMMENT_ID} -f body="$FINAL_BODY" || {
              echo "::warning::无法更新 PR 进度评论。"
            }
          else
            # fallback: post a new comment with final result
            gh api -X POST /repos/${OWNER_REPO}/issues/${PR_NUMBER}/comments -f body="$FINAL_BODY" >/dev/null 2>&1 || true
          fi

          # If triggered by issue_comment or workflow_dispatch, set Commit Status to reflect outcome (keeps visibility in Actions page)
          if [ "${{ github.event_name }}" == "issue_comment" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 获取 PR 的最新 Commit SHA
            SHA=$(gh pr view ${PR_NUMBER} --repo ${OWNER_REPO} --json headRefOid --template '{{.headRefOid}}')
            STATE="success"
            if [ $CODEX_EXIT_CODE -ne 0 ]; then STATE="failure"; fi
            
            gh api --method POST /repos/${OWNER_REPO}/statuses/${SHA} \
              -f state="${STATE}" \
              -f target_url="${{ github.server_url }}/${OWNER_REPO}/actions/runs/${{ github.run_id }}" \
              -f description="Codex Manual Review Completed" \
              -f context="Codex PR Review" >/dev/null 2>&1 || true
          fi

          # Print log for workflow output
          cat "$LOGFILE" || true

          exit $CODEX_EXIT_CODE
